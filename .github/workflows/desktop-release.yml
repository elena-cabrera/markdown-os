name: Build Desktop Releases

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-desktop:
    env:
      MARKDOWN_OS_DESKTOP_TARGET: ${{ matrix.os == 'windows-latest' && 'win32' || 'darwin' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --dev

      - name: Download vendored frontend assets
        run: uv run python scripts/download_vendor.py

      - name: Sync desktop version from pyproject.toml
        shell: bash
        run: |
          version=$(python3 -c "
          import tomllib
          from pathlib import Path
          p = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(p['project']['version'])
          ")
          cd desktop
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop TypeScript
        working-directory: desktop
        run: npm run build

      - name: Run targeted Python tests
        run: uv run pytest tests/test_prepare_desktop_resources.py tests/test_cli.py tests/test_server.py tests/test_workspace_session.py tests/test_frontend_navigation_sync.py -q

      - name: Package desktop app
        working-directory: desktop
        run: npm run dist

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/*.zip
