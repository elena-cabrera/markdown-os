name: Build Desktop App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install pyinstaller

      - name: Download vendor assets
        run: uv run python scripts/download_vendor.py

      - name: Build with PyInstaller
        run: uv run python -m PyInstaller markdown_os.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R dist/Markdown-OS.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Markdown-OS" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            Markdown-OS-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Markdown-OS-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --extra desktop
          uv pip install pyinstaller

      - name: Download vendor assets
        run: uv run python scripts/download_vendor.py

      - name: Build with PyInstaller
        run: uv run python -m PyInstaller markdown_os.spec --noconfirm

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Markdown-OS\*" -DestinationPath "Markdown-OS-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: Markdown-OS-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Markdown-OS-macos.dmg
            Markdown-OS-windows.zip
          generate_release_notes: true
