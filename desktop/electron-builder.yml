appId: com.markdownos.desktop
productName: Markdown-OS
directories:
  output: dist
  buildResources: build
files:
  - dist/*.js
  - package.json
extraResources:
  - from: ../markdown_os
    to: markdown_os
    filter:
      - "**/*"
  - from: ../README.md
    to: README.md
  - from: ../pyproject.toml
    to: pyproject.toml
  - from: ../uv.lock
    to: uv.lock
  - from: build
    to: .
    filter:
      - icon.png
      - icon.ico
      - uv
      - uv.exe
asar: true
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  icon: build/icon.icns
  artifactName: markdown-os-desktop-${version}-macos.${ext}
  fileAssociations:
    - ext:
        - md
        - markdown
      name: Markdown document
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: markdown-os-desktop-${version}-windows-setup.${ext}
fileAssociations:
  - ext: md
    name: Markdown document
  - ext: markdown
    name: Markdown document
nsis:
  oneClick: false
  perMachine: false
