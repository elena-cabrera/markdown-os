appId: com.markdownos.desktop
productName: Markdown-OS
directories:
  output: dist
  buildResources: build
files:
  - dist/*.js
  - package.json
extraResources:
  - from: build
    to: .
    filter:
      - icon.png
      - icon.ico
  - from: build/backend
    to: backend
    filter:
      - "**/*"
asar: true
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  icon: build/icon.png
  artifactName: markdown-os-desktop-${version}-macos.${ext}
  fileAssociations:
    - ext:
        - md
        - markdown
      name: Markdown document
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: markdown-os-desktop-${version}-windows-setup.${ext}
fileAssociations:
  - ext: md
    name: Markdown document
  - ext: markdown
    name: Markdown document
nsis:
  oneClick: false
  perMachine: false
