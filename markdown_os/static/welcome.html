<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown-OS</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <style>
      :root {
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --text: #1a1a2e;
        --text-muted: #6b7280;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --border: #e5e7eb;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        --recent-hover: #f3f4f6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --card-bg: #1e293b;
          --text: #f1f5f9;
          --text-muted: #94a3b8;
          --accent: #60a5fa;
          --accent-hover: #3b82f6;
          --border: #334155;
          --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
          --recent-hover: #334155;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      .welcome-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 48px;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }

      .welcome-logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: block;
      }

      .welcome-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.02em;
      }

      .welcome-subtitle {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 32px;
      }

      .open-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 32px;
      }

      .open-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition: background-color 0.15s, transform 0.1s;
      }

      .open-btn:active {
        transform: scale(0.97);
      }

      .open-btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .open-btn-primary:hover {
        background: var(--accent-hover);
      }

      .open-btn-secondary {
        background: var(--border);
        color: var(--text);
      }

      .open-btn-secondary:hover {
        background: var(--text-muted);
        color: #fff;
      }

      .open-btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .recent-section {
        text-align: left;
      }

      .recent-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .recent-list {
        list-style: none;
      }

      .recent-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.12s;
        font-size: 13px;
      }

      .recent-item:hover {
        background: var(--recent-hover);
      }

      .recent-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: var(--text-muted);
      }

      .recent-name {
        font-weight: 500;
      }

      .recent-path {
        color: var(--text-muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .recent-empty {
        font-size: 13px;
        color: var(--text-muted);
        padding: 8px 0;
      }

      .error-banner {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 16px;
        font-size: 13px;
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        .error-banner {
          background: #451a1a;
          color: #fca5a5;
          border-color: #7f1d1d;
        }
      }
    </style>
  </head>
  <body>
    <div class="welcome-card">
      <svg class="welcome-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="56" height="48" rx="6" stroke="currentColor" stroke-width="3" fill="none" />
        <path d="M16 40V24l8 10 8-10v16" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M40 32h8m-4-4v8" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
      </svg>
      <h1 class="welcome-title">Markdown-OS</h1>
      <p class="welcome-subtitle">Open a markdown file or folder to get started.</p>

      <div id="error-banner" class="error-banner"></div>

      <div class="open-buttons">
        <button id="open-file-btn" class="open-btn open-btn-primary" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Open File
        </button>
        <button id="open-folder-btn" class="open-btn open-btn-secondary" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Open Folder
        </button>
      </div>

      <div id="recent-section" class="recent-section" style="display: none;">
        <h3 class="recent-title">Recent</h3>
        <ul id="recent-list" class="recent-list"></ul>
      </div>
    </div>

    <script>
      (() => {
        const RECENT_KEY = "markdown-os-recent-paths";
        const MAX_RECENT = 8;

        const errorBanner = document.getElementById("error-banner");
        const recentSection = document.getElementById("recent-section");
        const recentList = document.getElementById("recent-list");

        function showError(msg) {
          errorBanner.textContent = msg;
          errorBanner.style.display = "block";
          setTimeout(() => { errorBanner.style.display = "none"; }, 5000);
        }

        function getRecent() {
          try {
            return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
          } catch {
            return [];
          }
        }

        function addRecent(pathStr, type) {
          let recent = getRecent().filter((r) => r.path !== pathStr);
          recent.unshift({ path: pathStr, type: type, ts: Date.now() });
          if (recent.length > MAX_RECENT) recent = recent.slice(0, MAX_RECENT);
          try {
            localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
          } catch { /* ignore */ }
        }

        function renderRecent() {
          const items = getRecent();
          if (items.length === 0) {
            recentSection.style.display = "none";
            return;
          }
          recentSection.style.display = "block";
          recentList.innerHTML = "";
          for (const item of items) {
            const li = document.createElement("li");
            li.className = "recent-item";
            const isFolder = item.type === "folder";
            const name = item.path.split(/[/\\]/).pop();
            li.innerHTML = `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                ${isFolder
                  ? '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>'
                  : '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'
                }
              </svg>
              <div>
                <div class="recent-name">${name}</div>
                <div class="recent-path">${item.path}</div>
              </div>
            `;
            li.addEventListener("click", () => openPathAndNavigate(item.path));
            recentList.appendChild(li);
          }
        }

        async function openPathAndNavigate(pathStr) {
          if (!window.pywebview || !window.pywebview.api) {
            showError("Desktop bridge not available.");
            return;
          }
          try {
            const result = await window.pywebview.api.open_path(pathStr);
            if (result.error) {
              showError(result.error);
              return;
            }
            const isDir = !pathStr.match(/\.(md|markdown)$/i);
            addRecent(pathStr, isDir ? "folder" : "file");
            window.location.href = result.url;
          } catch (err) {
            showError("Failed to open: " + err.message);
          }
        }

        document.getElementById("open-file-btn").addEventListener("click", async () => {
          if (!window.pywebview || !window.pywebview.api) {
            showError("Desktop bridge not available. Launch via the desktop app.");
            return;
          }
          try {
            const path = await window.pywebview.api.open_file_dialog();
            if (path) await openPathAndNavigate(path);
          } catch (err) {
            showError("Failed to open file dialog: " + err.message);
          }
        });

        document.getElementById("open-folder-btn").addEventListener("click", async () => {
          if (!window.pywebview || !window.pywebview.api) {
            showError("Desktop bridge not available. Launch via the desktop app.");
            return;
          }
          try {
            const path = await window.pywebview.api.open_folder_dialog();
            if (path) await openPathAndNavigate(path);
          } catch (err) {
            showError("Failed to open folder dialog: " + err.message);
          }
        });

        renderRecent();
      })();
    </script>
  </body>
</html>
