<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>markdown-os releases</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #2f3136;
        --panel: #383b41;
        --text: #f5f6f7;
        --muted: #c8cbd1;
        --border: #494c52;
        --header-max-width: 1120px;
        --page-max-width: 1060px;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 0 32px;
        background: rgba(47, 49, 54, 0.92);
        backdrop-filter: blur(10px);
      }

      .header-content {
        max-width: var(--header-max-width);
        margin: 0 auto;
        padding: 16px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 16px;
        color: var(--text);
        text-decoration: none;
      }

      .logo-icon {
        width: 27px;
        height: 27px;
      }

      .back-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 14px;
      }

      .back-link:hover {
        color: var(--text);
      }

      .page {
        max-width: var(--page-max-width);
        margin: 0 auto;
        padding: 92px 24px 64px;
      }

      .releases {
        display: grid;
        gap: 24px;
      }

      .release-item {
        padding: 4px 0 10px;
      }

      .release-title {
        font-size: 46px;
        letter-spacing: -0.03em;
        line-height: 1.05;
        margin: 0;
      }

      .release-title a {
        color: var(--text);
        text-decoration: none;
      }

      .release-notes {
        margin: 14px 0 0;
        padding-left: 24px;
        color: var(--text);
      }

      .release-notes li {
        margin: 4px 0;
        line-height: 1.5;
        font-size: 18px;
      }

      .release-assets {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
      }

      .asset-link {
        display: inline-flex;
        align-items: stretch;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        overflow: hidden;
        font-size: 14px;
        line-height: 1;
      }

      .asset-label,
      .asset-ext {
        padding: 8px 12px;
      }

      .asset-ext {
        font-size: 11px;
        background: rgba(0, 0, 0, 0.2);
      }

      .asset-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .asset-label svg {
        width: 16px;
        height: 16px;
      }

      .asset-link.macos {
        background: #f2f2f2;
        color: #1a1a1a;
      }

      .asset-link.windows {
        background: #2a74d9;
      }

      .asset-link.linux {
        background: #6f4a93;
      }

      .asset-link.generic {
        background: #666;
      }

      .empty {
        border: 1px dashed var(--border);
        padding: 16px;
        color: var(--muted);
        border-radius: 8px;
      }

      @media (max-width: 760px) {
        .site-header {
          padding: 0 20px;
        }

        .page {
          padding: 84px 20px 56px;
        }

        .release-title {
          font-size: 32px;
        }

        .release-notes li {
          font-size: 18px;
        }

        .asset-link {
          font-size: 14px;
        }

        .asset-ext {
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <a href="/" class="logo">
          <svg
            class="logo-icon"
            width="27"
            height="27"
            viewBox="0 0 27 27"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M0 5C0 2.23858 2.23858 0 5 0H22C24.7614 0 27 2.23858 27 5V22C27 24.7614 24.7614 27 22 27H5C2.23858 27 0 24.7614 0 22V5Z"
              fill="#1C1C1E"
            />
            <path
              d="M19.6105 8.66L20.0705 18.86L21.7905 19.56L21.6705 20H16.9305L16.8105 19.56L17.7105 19.12C18.1371 18.92 18.3438 18.66 18.3305 18.34L17.8905 8.54L14.0505 19.6L12.8105 20L12.4305 19.8L8.69047 8.56L8.13047 18.86L9.65047 19.56L9.53047 20H5.33047L5.21047 19.56L6.31047 19.1C6.6438 18.9533 6.83714 18.8067 6.89047 18.66C6.9038 18.5933 6.91714 18.4867 6.93047 18.34L7.43047 8.14L5.71047 7.44L5.83047 7H9.87047L10.1305 7.2L13.5105 17.64L17.0505 7H21.2105L21.3305 7.44L20.2305 7.9C19.8038 8.07333 19.5971 8.32667 19.6105 8.66Z"
              fill="white"
            />
          </svg>
          markdown-os
        </a>
        <a class="back-link" href="/">← Back to homepage</a>
      </div>
    </header>

    <main class="page">
      <section id="downloads-root" class="releases" aria-live="polite"></section>
      <section id="downloads-empty" class="empty" hidden>
        No desktop release assets are available yet.
      </section>
    </main>

    <script>
      const RELEASES_API =
        "https://api.github.com/repos/elena-cabrera/markdown-os/releases";

      const ICONS = {
        macos: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47c-1.34.03-1.77-.79-3.29-.79c-1.53 0-2 .77-3.27.82c-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51c1.28-.02 2.5.87 3.29.87c.78 0 2.26-1.07 3.81-.91c.65.03 2.47.26 3.64 1.98c-.09.06-2.17 1.28-2.15 3.81c.03 3.02 2.65 4.03 2.68 4.04c-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19c-.69.85-1.83 1.51-2.95 1.42c-.15-1.15.41-2.35 1.05-3.11"/></svg>`,
        windows: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M21 13v7.434a1.5 1.5 0 0 1-1.553 1.499l-.133-.011L12 21.008V13zm-11 0v7.758l-5.248-.656A2 2 0 0 1 3 18.117V13zm9.314-10.922a1.5 1.5 0 0 1 1.68 1.355l.006.133V11h-9V2.992zM10 3.242V11H3V5.883a2 2 0 0 1 1.752-1.985z"/></svg>`,
        generic: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M12 15V3m9 12v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10l5 5l5-5"/></g></svg>`,
      };

      function classifyAsset(assetName) {
        const name = (assetName || "").toLowerCase();
        const extension = name.split(".").pop() || "";

        if (name.includes("macos") || name.endsWith(".dmg")) {
          return { family: "macos", label: "macOS", icon: ICONS.macos, ext: extension.toUpperCase() };
        }

        if (name.includes("windows") || name.endsWith(".exe")) {
          if (name.includes("arm")) {
            return { family: "windows", label: "Windows (ARM)", icon: ICONS.windows, ext: extension.toUpperCase() };
          }
          if (name.includes("32") || name.includes("x86")) {
            return { family: "windows", label: "Windows (32bit)", icon: ICONS.windows, ext: extension.toUpperCase() };
          }
          return { family: "windows", label: "Windows (64bit)", icon: ICONS.windows, ext: extension.toUpperCase() };
        }

        if (name.includes("linux") || name.endsWith(".deb") || name.endsWith(".tar.gz")) {
          if (name.includes("arm")) {
            return { family: "linux", label: "Linux (ARM)", icon: ICONS.generic, ext: extension.toUpperCase() };
          }
          return { family: "linux", label: "Linux (64bit)", icon: ICONS.generic, ext: extension.toUpperCase() };
        }

        return null;
      }

      function extractNotes(body) {
        if (!body) return [];
        return body
          .split("\n")
          .map((line) => line.trim())
          .filter((line) => /^[*-]\s+/.test(line))
          .map((line) => line.replace(/^[*-]\s+/, ""));
      }

      function renderRelease(release) {
        const wrapper = document.createElement("article");
        wrapper.className = "release-item";

        const title = document.createElement("h2");
        title.className = "release-title";

        const releaseLink = document.createElement("a");
        releaseLink.href = release.html_url;
        releaseLink.target = "_blank";
        releaseLink.rel = "noopener";
        releaseLink.textContent = release.tag_name || release.name || "Unnamed release";
        title.appendChild(releaseLink);
        wrapper.appendChild(title);

        const notes = extractNotes(release.body || "");
        if (notes.length > 0) {
          const list = document.createElement("ul");
          list.className = "release-notes";
          notes.forEach((note) => {
            const item = document.createElement("li");
            item.textContent = note;
            list.appendChild(item);
          });
          wrapper.appendChild(list);
        }

        const assets = (release.assets || []).map((asset) => ({
          asset,
          details: classifyAsset(asset.name),
        })).filter((entry) => entry.details);

        if (assets.length > 0) {
          const actions = document.createElement("div");
          actions.className = "release-assets";

          assets.forEach(({ asset, details }) => {
            const link = document.createElement("a");
            link.className = `asset-link ${details.family}`;
            link.href = asset.browser_download_url;
            link.target = "_blank";
            link.rel = "noopener";

            const label = document.createElement("span");
            label.className = "asset-label";
            label.innerHTML = `${details.icon}<span>${details.label}</span>`;

            const ext = document.createElement("span");
            ext.className = "asset-ext";
            ext.textContent = details.ext;

            link.appendChild(label);
            link.appendChild(ext);
            actions.appendChild(link);
          });

          wrapper.appendChild(actions);
        }

        return wrapper;
      }

      async function loadDownloads() {
        const root = document.getElementById("downloads-root");
        const empty = document.getElementById("downloads-empty");

        try {
          const response = await fetch(RELEASES_API);
          if (!response.ok) {
            throw new Error(`Release fetch failed (${response.status})`);
          }

          const releases = await response.json();
          const desktopReleases = releases.filter((release) =>
            (release.assets || []).some((asset) => classifyAsset(asset.name || "")),
          );

          if (desktopReleases.length === 0) {
            empty.hidden = false;
            return;
          }

          desktopReleases.forEach((release) => {
            root.appendChild(renderRelease(release));
          });
        } catch (error) {
          empty.hidden = false;
          empty.textContent = "Failed to load releases from GitHub.";
          console.error(error);
        }
      }

      loadDownloads();
    </script>
  </body>
</html>
